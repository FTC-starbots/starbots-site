<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>Login - Admin Starbots FTC</title>
    <link rel="icon" type="image/webp" href="/images/afonso.webp">
    <link rel="apple-touch-icon" href="/images/afonso.webp">
    <link rel="stylesheet" href="styles.css?v=20250301">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <div class="admin-login-wrap">
        <div class="admin-login-bg">
            <img src="/images/equipe-hero.jpg" alt="" aria-hidden="true">
        </div>
        <div class="admin-login-card">
            <h1>Admin Starbots FTC</h1>
            <p class="admin-login-subtitle">Acesse a área de gestão do site.</p>
            <form id="login-form" method="post" action="#" aria-label="Formulário de login">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="submit" class="admin-btn admin-btn-primary">Entrar</button>
            </form>
            <p style="margin-top: 1.25rem; font-size: 0.85rem;">
                <a href="/" style="color: var(--accent-color);">Voltar ao site</a>
            </p>
        </div>
    </div>
</body>
</html>
