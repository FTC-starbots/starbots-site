<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css?v=20250301">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f5; font-family: Inter, sans-serif; }
        .login-box { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 360px; }
        .login-box h1 { margin: 0 0 1.5rem; font-size: 1.5rem; color: #1a1a1a; }
        .login-box label { display: block; margin-bottom: 0.35rem; font-weight: 500; font-size: 0.9rem; }
        .login-box input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; margin-bottom: 1rem; }
        .login-box button { width: 100%; padding: 0.7rem; background: var(--primary-color, #1a1a1a); color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer; }
        .login-box button:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-error { margin-top: 1rem; color: #c00; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Login</h1>
        <form id="login-form">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit" id="btn-submit">Entrar</button>
        </form>
        <p id="login-error" class="login-error" aria-live="polite"></p>
    </div>
    <script>
        (function() {
            var form = document.getElementById('login-form');
            var btn = document.getElementById('btn-submit');
            var err = document.getElementById('login-error');
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                err.textContent = '';
                btn.disabled = true;
                try {
                    var res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: form.email.value.trim(), password: form.password.value })
                    });
                    var data = await res.json().catch(function() { return {}; });
                    if (res.ok && data.ok) {
                        window.location.href = '/dashboard';
                        return;
                    }
                    err.textContent = data.error || 'Falha no login. Tente novamente.';
                } catch (e) {
                    err.textContent = 'Erro de conexão. Tente novamente.';
                }
                btn.disabled = false;
            });
        })();
    </script>
</body>
</html>
